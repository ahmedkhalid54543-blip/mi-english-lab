<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mi English - 登录</title>
  <link rel="stylesheet" href="css/style.css?v=3.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <meta name="mi-supabase-url" content="">
  <meta name="mi-supabase-anon-key" content="">
  <style>
    .auth-wrap {
      max-width: 460px;
      margin: 36px auto 0;
      padding: 0 16px 32px;
    }
    .auth-card {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      padding: 22px;
    }
    .auth-title {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .auth-sub {
      color: var(--text-muted);
      font-size: 0.8125rem;
      margin-bottom: 16px;
    }
    .auth-input {
      width: 100%;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      padding: 12px;
      font-size: 0.9375rem;
      margin-bottom: 10px;
      font-family: inherit;
      background: #fff;
    }
    .auth-actions {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
      margin-top: 8px;
    }
    .auth-btn {
      border: none;
      border-radius: var(--radius-md);
      padding: 10px 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }
    .auth-btn.primary {
      background: var(--mi-orange);
      color: #fff;
    }
    .auth-btn.secondary {
      background: var(--bg-soft);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
    }
    .sync-status {
      margin-top: 12px;
      font-size: 0.8125rem;
      border-radius: var(--radius-md);
      padding: 10px 12px;
      border: 1px solid var(--border-light);
      background: var(--bg-soft);
      color: var(--text-secondary);
      min-height: 40px;
    }
    .sync-status.success {
      border-color: #BBF7D0;
      background: #F0FDF4;
      color: #166534;
    }
    .sync-status.error {
      border-color: #FECACA;
      background: #FEF2F2;
      color: #991B1B;
    }
    .sync-status.offline {
      border-color: #FDE68A;
      background: #FFFBEB;
      color: #92400E;
    }
    .auth-footer {
      margin-top: 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <nav class="nav-header">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <div class="nav-logo">Mi</div>
        <div>
          <span class="nav-title">Mi English</span>
          <span class="nav-subtitle">v3.0 Lab</span>
        </div>
      </a>
    </div>
  </nav>

  <main class="auth-wrap">
    <section class="auth-card">
      <h1 class="auth-title">登录并同步学习进度</h1>
      <p class="auth-sub">邮箱登录后可自动同步词汇与场景进度（支持跨设备）。</p>

      <input id="emailInput" class="auth-input" type="email" placeholder="请输入邮箱" autocomplete="email">
      <input id="passwordInput" class="auth-input" type="password" placeholder="请输入密码" autocomplete="current-password">

      <div class="auth-actions">
        <button id="signInBtn" class="auth-btn primary" type="button">登录</button>
        <button id="signUpBtn" class="auth-btn secondary" type="button">注册</button>
      </div>

      <div id="syncStatus" class="sync-status">请先填写 Supabase 配置（页面 meta 或 window.MI_SUPABASE_CONFIG）后使用登录。</div>

      <div class="auth-footer">
        <div>登录成功后将自动执行：云端拉取 + 本地合并 + 离线队列补发。</div>
        <div><a href="index.html">返回首页</a></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js?v=3.0"></script>
  <script src="js/role-config.js?v=3.0"></script>
  <script src="js/sync-meta.js?v=3.0"></script>
  <script src="js/storage.js?v=3.0"></script>
  <script src="js/analytics.js?v=3.0"></script>
  <script src="js/supabase-config.js?v=3.0"></script>
  <script src="js/auth.js?v=3.0"></script>
  <script src="js/api.js?v=3.0"></script>
  <script src="js/sync-diagnostics.js?v=3.0"></script>
  <script>
    (function initLoginPage() {
      var emailInput = document.getElementById('emailInput');
      var passwordInput = document.getElementById('passwordInput');
      var signInBtn = document.getElementById('signInBtn');
      var signUpBtn = document.getElementById('signUpBtn');
      var syncStatus = document.getElementById('syncStatus');

      function updateStatus(status, message) {
        syncStatus.className = 'sync-status ' + (status || '');
        syncStatus.textContent = message || '';
      }

      function readCredentials() {
        return {
          email: (emailInput.value || '').trim(),
          password: passwordInput.value || ''
        };
      }

      function validateInput(creds) {
        if (!creds.email || creds.email.indexOf('@') < 0) {
          updateStatus('error', '请输入有效邮箱');
          return false;
        }
        if (!creds.password || creds.password.length < 6) {
          updateStatus('error', '密码至少 6 位');
          return false;
        }
        return true;
      }

      async function syncAfterLogin() {
        updateStatus('', '登录成功，正在同步进度...');

        var localState = loadState();
        await MiApi.syncLocalStateToCloud(localState, { reason: 'login' });
        await MiApi.pullAndMergeToLocal();
        await MiApi.flushQueue();

        updateStatus('success', '同步成功，正在跳转首页...');
        setTimeout(function redirectSoon() {
          window.location.href = 'index.html';
        }, 900);
      }

      signInBtn.addEventListener('click', async function onSignIn() {
        var creds = readCredentials();
        if (!validateInput(creds)) return;

        updateStatus('', '登录中...');
        var result = await MiAuth.signInWithEmail(creds.email, creds.password);
        if (!result.ok) {
          updateStatus('error', '登录失败：' + result.error);
          return;
        }

        if (window.MiAnalytics) {
          MiAnalytics.trackEvent('auth_login', { email: creds.email });
        }

        await syncAfterLogin();
      });

      signUpBtn.addEventListener('click', async function onSignUp() {
        var creds = readCredentials();
        if (!validateInput(creds)) return;

        updateStatus('', '注册中...');
        var result = await MiAuth.signUpWithEmail(creds.email, creds.password);
        if (!result.ok) {
          updateStatus('error', '注册失败：' + result.error);
          return;
        }

        if (window.MiAnalytics) {
          MiAnalytics.trackEvent('auth_signup', { email: creds.email });
        }

        updateStatus('success', '注册成功。现在可直接登录并同步学习进度。');
      });

      window.addEventListener('mi-sync-status', function onSyncStatus(event) {
        if (!event || !event.detail) return;
        updateStatus(event.detail.status, event.detail.message);
      });

      var setup = MiAuth.ensureClient();
      if (!setup.ok) {
        updateStatus('error', 'Supabase 未就绪：' + setup.error);
      }

      var hint = MiAuth.getLastEmailHint();
      if (hint) {
        emailInput.value = hint;
      }
    })();
  </script>
</body>
</html>
