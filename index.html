<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mi-supabase-url" content="">
  <meta name="mi-supabase-anon-key" content="">
  <title>Mi English - 小米国际英语学习助手</title>
  <link rel="stylesheet" href="css/style.css?v=3.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="nav-header">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <div class="nav-logo">Mi</div>
        <div>
          <span class="nav-title">Mi English</span>
          <span class="nav-subtitle">v3.0</span>
        </div>
      </a>
      <div class="nav-stats">
        <a href="login.html" class="level-badge" id="headerLoginLink" style="text-decoration:none;">登录</a>
        <span class="nav-streak">
          <i class="fas fa-fire"></i>
          <span id="streakCount">0</span>
        </span>
        <span class="level-badge" id="levelBadge">Lv.1</span>
      </div>
    </div>
  </nav>

  <main class="container page-content home-dashboard-page">
    <section class="home-status-card">
      <div class="home-status-top">
        <div class="home-status-copy">
          <p class="home-status-kicker" id="homeGreeting">Good morning · 任务中心</p>
          <h1 class="home-status-title">今天先做这一件事</h1>
          <p class="home-status-summary" id="homeStatusSummary">首页已经收成任务中心，不再把所有入口堆在首屏。</p>
        </div>
        <div class="sync-pill" id="homeSyncStatus">未登录</div>
      </div>

      <div class="home-metric-grid">
        <div class="home-metric-card">
          <div class="home-metric-label">Streak</div>
          <div class="home-metric-value" id="homeStreakValue">0</div>
        </div>
        <div class="home-metric-card">
          <div class="home-metric-label">XP</div>
          <div class="home-metric-value" id="homeXPValue">0</div>
        </div>
        <div class="home-metric-card">
          <div class="home-metric-label">Level</div>
          <div class="home-metric-value" id="homeLevelValue">Lv.1</div>
        </div>
      </div>

      <div class="home-progress-block">
        <div class="home-progress-head">
          <span id="homeProgressLabel">词汇掌握 0/0 · 今日复习 0 项</span>
          <strong id="homeProgressPct">0%</strong>
        </div>
        <div class="home-progress-track">
          <div class="home-progress-fill" id="homeProgressBar" style="width:0%"></div>
        </div>
      </div>
    </section>

    <section class="home-section">
      <div class="home-section-head">
        <div>
          <p class="home-section-kicker">Today</p>
          <h2 class="home-section-title">今日任务</h2>
        </div>
        <p class="home-section-note">只保留 1 个主 CTA</p>
      </div>
      <div id="homePrimaryTask"></div>
      <div class="home-task-list" id="homeTaskList"></div>
    </section>

    <section class="home-section">
      <div class="home-section-head">
        <div>
          <p class="home-section-kicker">Next</p>
          <h2 class="home-section-title">下一步推荐</h2>
        </div>
        <p class="home-section-note" id="homeNextStepHint">基于你的角色路径</p>
      </div>
      <div id="homeNextStep"></div>
    </section>

    <section class="home-section home-section--quiet">
      <div class="home-section-head">
        <div>
          <p class="home-section-kicker">Access</p>
          <h2 class="home-section-title">其他入口</h2>
        </div>
        <p class="home-section-note">保留可达性，但全部下沉</p>
      </div>
      <div class="home-quick-links" id="homeQuickLinks"></div>
    </section>

    <div class="footer-v2">小米国际部英语培训专用</div>
  </main>

  <nav class="tab-bar">
    <a href="index.html" class="tab-bar-btn" data-tab="index"><i class="fas fa-home"></i><span>首页</span></a>
    <a href="learn.html" class="tab-bar-btn" data-tab="learn"><i class="fas fa-book-open"></i><span>学习</span></a>
    <a href="practice.html" class="tab-bar-btn" data-tab="practice"><i class="fas fa-gamepad"></i><span>练习</span></a>
    <a href="scenarios.html" class="tab-bar-btn" data-tab="scenarios"><i class="fas fa-map-location-dot"></i><span>场景</span></a>
    <button type="button" class="tab-bar-btn" data-tab="more" data-action="open-more-menu"><i class="fas fa-ellipsis"></i><span>更多</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js?v=3.0"></script>
  <script src="js/role-config.js?v=3.0"></script>
  <script src="js/sync-meta.js?v=3.0"></script>
  <script src="js/storage.js?v=3.0"></script>
  <script src="js/analytics.js?v=3.0"></script>
  <script src="js/supabase-config.js?v=3.0"></script>
  <script src="js/auth.js?v=3.0"></script>
  <script src="js/api.js?v=3.0"></script>
  <script src="js/sync-diagnostics.js?v=3.0"></script>
  <script src="js/weakness.js?v=3.0"></script>
  <script src="js/review-queue.js?v=3.0"></script>
  <script src="js/nav-more.js?v=1.0"></script>
  <script src="js/home-dashboard.js?v=3.0"></script>
</body>
</html>
