<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>进度 - Mi English</title>
  <link rel="stylesheet" href="css/style.css?v=3.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .level-card {
      background: linear-gradient(135deg, #1A1A2E, #2D2D5E);
      border-radius: var(--radius-xl); padding: 24px;
      color: white; text-align: center; margin-bottom: 16px;
      position: relative; overflow: hidden;
    }
    .level-card::before {
      content: ''; position: absolute; top: -50%; right: -30%;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(255,105,0,0.1);
    }
    .level-number { font-size: 3rem; font-weight: 800; }
    .level-name {
      font-size: 1rem; font-weight: 600; margin-top: 4px;
      color: var(--mi-orange); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .xp-bar-wrap { margin-top: 16px; }
    .xp-bar-bg {
      height: 10px; border-radius: 5px;
      background: rgba(255,255,255,0.15); overflow: hidden;
    }
    .xp-bar-fill {
      height: 100%; border-radius: 5px;
      background: linear-gradient(90deg, var(--mi-orange), #FF8533);
      transition: width 0.8s var(--ease-out);
    }
    .xp-labels {
      display: flex; justify-content: space-between;
      margin-top: 6px; font-size: 0.6875rem; opacity: 0.7;
    }
    .lesson-bars { margin-top: 16px; }
    .lesson-bar-item {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .lesson-bar-label {
      min-width: 36px; font-size: 0.75rem;
      font-weight: 700; color: var(--text-secondary);
    }
    .lesson-bar-track {
      flex: 1; height: 20px; background: var(--border-light);
      border-radius: 10px; overflow: hidden; position: relative;
    }
    .lesson-bar-fill {
      height: 100%; border-radius: 10px;
      transition: width 0.6s var(--ease-out);
    }
    .lesson-bar-fill.green { background: var(--mi-green); }
    .lesson-bar-fill.yellow { background: var(--mi-yellow); }
    .lesson-bar-fill.red { background: var(--mi-red); }
    .lesson-bar-pct {
      min-width: 36px; text-align: right;
      font-size: 0.75rem; font-weight: 600; color: var(--text-muted);
    }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-top: 1px solid var(--border-light);
      font-size: 0.8125rem;
    }
    .history-item:first-child { border-top: none; }
    .history-date { color: var(--text-muted); font-size: 0.75rem; }
    .history-score { font-weight: 700; }
    .data-section { margin-top: 16px; }
    .file-input-hidden { display: none; }
  </style>
</head>
<body>
  <!-- Top Nav -->
  <nav class="nav-header">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <div class="nav-logo">Mi</div>
        <span class="nav-title">进度</span>
      </a>
      <div class="nav-stats">
        <span class="nav-streak" id="navStreak"><i class="fas fa-fire"></i><span id="streakCount">0</span></span>
      </div>
    </div>
  </nav>

  <div class="container page-content">
    <!-- Level Card -->
    <div class="level-card animate-scaleIn" id="levelCard">
      <div class="level-number" id="levelNum">Lv.1</div>
      <div class="level-name" id="levelName">NOVICE</div>
      <div class="xp-bar-wrap">
        <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpFill" style="width:0%"></div></div>
        <div class="xp-labels">
          <span id="xpCurrent">0 XP</span>
          <span id="xpNext">Next: 50 XP</span>
        </div>
      </div>
    </div>

    <!-- Stats Overview -->
    <div class="stats-grid animate-fadeIn delay-1">
      <div class="stat-card">
        <div class="stat-icon">📚</div>
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">总计</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-value text-green" id="statMastered">0</div>
        <div class="stat-label">已掌握</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔶</div>
        <div class="stat-value text-yellow" id="statShaky">0</div>
        <div class="stat-label">不太熟</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">❌</div>
        <div class="stat-value text-red" id="statUnknown">0</div>
        <div class="stat-label">不会</div>
      </div>
    </div>

    <!-- Mastery by Lesson -->
    <div class="card card-padded animate-fadeIn delay-2">
      <h3 class="section-title"><i class="fas fa-layer-group"></i> 课程掌握度</h3>
      <div class="lesson-bars" id="lessonBars"></div>
    </div>

    <!-- Achievements -->
    <h3 class="section-title mt-6 animate-fadeIn delay-2"><i class="fas fa-trophy"></i> 成就</h3>
    <div class="achievement-grid animate-fadeIn delay-3" id="achievementGrid"></div>

    <!-- Practice History -->
    <div class="card card-padded mt-6 animate-fadeIn delay-3">
      <h3 class="section-title"><i class="fas fa-history"></i> 练习记录</h3>
      <div id="historyList">
        <div class="empty-state"><p>暂无练习记录</p></div>
      </div>
    </div>

    <!-- Data Management -->
    <div class="card card-padded mt-6 data-section animate-fadeIn delay-4">
      <h3 class="section-title"><i class="fas fa-database"></i> 数据管理</h3>
      <div class="data-actions">
        <button class="btn btn-outline btn-block" onclick="doExport()">
          <i class="fas fa-download"></i> 导出数据
        </button>
        <button class="btn btn-outline btn-block" onclick="document.getElementById('importFile').click()">
          <i class="fas fa-upload"></i> 导入数据
        </button>
        <input type="file" id="importFile" class="file-input-hidden" accept=".json" onchange="doImport(event)">
        <button class="btn btn-danger btn-block" onclick="doReset()">
          <i class="fas fa-trash-alt"></i> 重置所有进度
        </button>
      </div>
    </div>

    <div style="height:16px;"></div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <a href="index.html" class="tab-bar-btn" data-tab="index"><i class="fas fa-home"></i><span>首页</span></a>
    <a href="learn.html" class="tab-bar-btn" data-tab="learn"><i class="fas fa-book-open"></i><span>学习</span></a>
    <a href="practice.html" class="tab-bar-btn" data-tab="practice"><i class="fas fa-gamepad"></i><span>练习</span></a>
    <a href="scenarios.html" class="tab-bar-btn" data-tab="scenarios"><i class="fas fa-map-location-dot"></i><span>场景</span></a>
    <button type="button" class="tab-bar-btn" data-tab="more" data-action="open-more-menu"><i class="fas fa-ellipsis"></i><span>更多</span></button>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js?v=3.0"></script>
  <script src="js/role-config.js?v=3.0"></script>
  <script src="js/sync-meta.js?v=3.0"></script>
  <script src="js/storage.js?v=3.0"></script>
  <script src="js/analytics.js?v=3.0"></script>
  <script src="js/supabase-config.js?v=3.0"></script>
  <script src="js/auth.js?v=3.0"></script>
  <script src="js/api.js?v=3.0"></script>
  <script src="js/sync-diagnostics.js?v=3.0"></script>
  <script src="js/nav-more.js?v=1.0"></script>
  <script>
    let state = loadState();

    function init() {
      const result = initSession(state);
      state = result.state;

      renderLevel();
      renderStats();
      renderLessonBars();
      renderAchievements();
      renderHistory();
      document.getElementById('streakCount').textContent = state.streak;
    }

    function renderLevel() {
      document.getElementById('levelNum').textContent = `Lv.${state.level}`;
      document.getElementById('levelName').textContent = getLevelName(state.level).toUpperCase();

      const current = getCurrentLevelXP(state);
      const needed = getNeededLevelXP(state);
      const pct = needed > 0 ? Math.min((current / needed) * 100, 100) : 100;

      document.getElementById('xpFill').style.width = pct + '%';
      document.getElementById('xpCurrent').textContent = `${state.xp} XP`;
      document.getElementById('xpNext').textContent = isMaxLevel(state) ? 'MAX ✨' : `Next: ${getXPForNextLevel(state)} XP`;
    }

    function renderStats() {
      const all = getAllVocab();
      document.getElementById('statTotal').textContent = all.length;
      document.getElementById('statMastered').textContent = countStatus(state, 'mastered');
      document.getElementById('statShaky').textContent = countStatus(state, 'shaky');
      document.getElementById('statUnknown').textContent = countStatus(state, 'unknown');
    }

    function renderLessonBars() {
      const container = document.getElementById('lessonBars');
      let html = '';

      DATA.lessons.forEach(lesson => {
        if (lesson.vocab.length === 0) return;
        const mastered = lesson.vocab.filter(v => state.vocabStatus[v.id] === 'mastered').length;
        const shaky = lesson.vocab.filter(v => state.vocabStatus[v.id] === 'shaky').length;
        const unknown = lesson.vocab.filter(v => state.vocabStatus[v.id] === 'unknown').length;
        const total = lesson.vocab.length;
        const pctM = (mastered / total) * 100;
        const pctS = (shaky / total) * 100;
        const pctU = (unknown / total) * 100;
        const pctTotal = Math.round(pctM);

        const colorClass = pctM >= 80 ? 'green' : pctM >= 40 ? 'yellow' : pctM > 0 ? 'red' : '';

        html += `
          <div class="lesson-bar-item">
            <span class="lesson-bar-label">${lesson.id}</span>
            <div class="lesson-bar-track">
              <div class="lesson-bar-fill ${colorClass}" style="width:${pctM}%"></div>
            </div>
            <span class="lesson-bar-pct">${pctTotal}%</span>
          </div>`;
      });

      container.innerHTML = html;
    }

    function renderAchievements() {
      const grid = document.getElementById('achievementGrid');
      const unlockedIds = new Set(state.achievements.map(a => a.id));

      let html = '';
      ACHIEVEMENTS.forEach(a => {
        const unlocked = unlockedIds.has(a.id);
        const ua = state.achievements.find(x => x.id === a.id);

        html += `
          <div class="achievement-item ${unlocked ? 'unlocked' : 'locked'}">
            <div class="achievement-icon">${a.icon}</div>
            <div class="achievement-title">${a.title}</div>
            <div class="achievement-desc">${a.desc}</div>
            ${unlocked && ua ? `<div class="achievement-date">${new Date(ua.unlockedAt).toLocaleDateString()}</div>` : ''}
          </div>`;
      });

      grid.innerHTML = html;
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      const history = [...state.practiceHistory].reverse().slice(0, 20);

      if (history.length === 0) {
        list.innerHTML = '<div class="empty-state" style="padding:16px;"><p>暂无练习记录，去练习页面开始吧！</p></div>';
        return;
      }

      let html = '';
      history.forEach(h => {
        const pct = Math.round((h.score / h.total) * 100);
        const color = pct >= 80 ? 'var(--mi-green)' : pct >= 60 ? 'var(--mi-yellow)' : 'var(--mi-red)';

        html += `
          <div class="history-item">
            <div>
              <span class="history-date">${new Date(h.date).toLocaleDateString()}</span>
              <span style="margin-left:8px;font-size:0.75rem;color:var(--text-muted);">${h.mode || 'quiz'}</span>
            </div>
            <span class="history-score" style="color:${color}">${h.score}/${h.total} (${pct}%)</span>
          </div>`;
      });

      list.innerHTML = html;
    }

    // Data Management
    function doExport() {
      exportData(state);
      showToast('数据已导出！💾');
    }

    function doImport(event) {
      const file = event.target.files[0];
      if (!file) return;

      importData(file).then(result => {
        state = result.state;
        if (result.modulesImported === false) {
          showToast('导入成功（旧版备份：未包含场景/词根进度）');
        } else {
          showToast(result.backupAt ? '导入成功，已自动备份导入前数据 ✅' : '导入成功！✅');
        }
        init();
      }).catch(err => {
        showToast('导入失败：' + err.message);
      });

      event.target.value = '';
    }

    function doReset() {
      if (!confirm('确定要重置吗？这将清除所有学习进度、成就和练习记录，此操作不可撤销！')) return;
      if (!confirm('真的确定吗？这是最后一次确认机会！')) return;

      clearAllStoredData();
      state = getDefaultState();
      saveState(state);
      showToast('所有数据已清除 🗑️');
      init();
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (type === 'achievement' ? ' achievement' : '');
      setTimeout(() => { t.className = 'toast'; }, 2500);
    }

    init();
  </script>
</body>
</html>
