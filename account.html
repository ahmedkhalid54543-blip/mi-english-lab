<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mi-supabase-url" content="">
  <meta name="mi-supabase-anon-key" content="">
  <title>Mi English - 账号设置</title>
  <link rel="stylesheet" href="css/style.css?v=3.1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ── Account Page ── */
    .acct-wrapper {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px 16px 100px;
      display: grid;
      gap: 14px;
    }

    /* ── Profile Banner ── */
    .acct-banner {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      padding: 22px 20px 20px;
      color: var(--text-inverse);
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.16), transparent 28%),
        linear-gradient(135deg, #ff6900 0%, #ff7b1b 42%, #ffb347 100%);
      box-shadow: var(--shadow-lg);
    }
    .acct-banner-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .acct-banner-user {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .acct-banner-name {
      font-size: 1.125rem;
      font-weight: 800;
      line-height: 1.2;
    }
    .acct-banner-email {
      font-size: 0.75rem;
      opacity: 0.85;
      word-break: break-all;
    }
    .acct-banner-badge {
      flex: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.25);
      font-size: 0.6875rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .acct-banner-hint {
      font-size: 0.8125rem;
      opacity: 0.9;
      line-height: 1.55;
    }

    /* ── Guest Card ── */
    .acct-guest {
      border-radius: 22px;
      padding: 24px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      text-align: center;
    }
    .acct-guest-icon {
      font-size: 2rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .acct-guest h2 {
      font-size: 1.125rem;
      margin-bottom: 6px;
    }
    .acct-guest p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .acct-guest-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    /* ── Section Card ── */
    .acct-section {
      border-radius: 20px;
      padding: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
    }
    .acct-section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .acct-section-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      flex: none;
    }
    .acct-section-icon.orange { background: var(--mi-orange-light); color: var(--mi-orange); }
    .acct-section-icon.blue   { background: var(--mi-blue-light);   color: var(--mi-blue); }
    .acct-section-icon.purple { background: #F3E8FF; color: var(--mi-purple); }
    .acct-section-icon.red    { background: var(--mi-red-light);    color: var(--mi-red); }
    .acct-section-head h2 {
      font-size: 1rem;
      font-weight: 800;
    }
    .acct-section-head p {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ── Form Elements ── */
    .acct-field {
      margin-bottom: 14px;
    }
    .acct-field:last-child {
      margin-bottom: 0;
    }
    .acct-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .acct-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.9375rem;
      font-family: inherit;
      background: var(--bg-card);
      transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
    }
    .acct-input:focus {
      outline: none;
      border-color: rgba(255,105,0,0.4);
      box-shadow: 0 0 0 3px rgba(255,105,0,0.1);
    }
    .acct-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }
    .acct-current {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--bg-soft);
      border: 1px solid var(--border-light);
      margin-bottom: 14px;
    }
    .acct-current-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .acct-current-value {
      font-size: 0.9375rem;
      font-weight: 700;
      word-break: break-all;
    }

    /* ── Avatar Picker Area ── */
    .acct-avatar-zone {
      padding: 16px;
      border-radius: 16px;
      background: var(--bg-soft);
      border: 1px solid var(--border-light);
      margin-bottom: 14px;
    }
    .acct-avatar-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .acct-avatar-top-text strong {
      display: block;
      font-size: 0.8125rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .acct-avatar-top-text span {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .acct-avatar-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px 6px 6px;
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: 14px;
      box-shadow: var(--shadow-sm);
      flex: none;
    }
    .acct-avatar-chip .pixel-avatar {
      width: max-content;
      min-width: max-content;
    }
    .acct-avatar-chip > div strong {
      display: block;
      font-size: 0.75rem;
      line-height: 1.1;
    }
    .acct-avatar-chip > div span {
      display: block;
      font-size: 0.625rem;
      color: var(--text-muted);
    }

    /* ── Buttons ── */
    .acct-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      border-radius: 14px;
      padding: 11px 18px;
      font-weight: 700;
      font-size: 0.875rem;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: transform var(--duration-fast), box-shadow var(--duration-fast);
    }
    .acct-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .acct-btn:active {
      transform: scale(0.98);
    }
    .acct-btn.primary {
      background: linear-gradient(135deg, #FF6900, #FF8A24);
      color: #fff;
    }
    .acct-btn.secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .acct-btn.danger {
      background: #FEF2F2;
      color: #B91C1C;
      border: 1px solid #FECACA;
    }
    .acct-btn.ghost {
      background: var(--bg-soft);
      color: var(--text-secondary);
      border: 1px solid var(--border-light);
    }
    .acct-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    /* ── Status Toast ── */
    .acct-status {
      font-size: 0.8125rem;
      border-radius: 14px;
      padding: 10px 14px;
      border: 1px solid var(--border-light);
      background: var(--bg-soft);
      color: var(--text-secondary);
      line-height: 1.55;
      margin-top: 12px;
    }
    .acct-status:empty {
      display: none;
    }
    .acct-status.success {
      border-color: #BBF7D0;
      background: #F0FDF4;
      color: #166534;
    }
    .acct-status.error {
      border-color: #FECACA;
      background: #FEF2F2;
      color: #991B1B;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .acct-banner-top {
        flex-direction: column;
        align-items: flex-start;
      }
      .acct-avatar-top {
        flex-direction: column;
      }
      .acct-guest-actions {
        flex-direction: column;
      }
      .acct-guest-actions .acct-btn {
        width: 100%;
      }
      .profile-avatar-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <nav class="nav-header">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <div class="nav-logo">Mi</div>
        <div>
          <span class="nav-title">Mi English</span>
          <span class="nav-subtitle">账号</span>
        </div>
      </a>
      <div class="nav-stats">
        <a href="index.html" class="level-badge" style="text-decoration:none;">
          <i class="fas fa-arrow-left" style="font-size:0.625rem;"></i> 首页
        </a>
      </div>
    </div>
  </nav>

  <main class="acct-wrapper">
    <!-- ── Banner ── -->
    <section class="acct-banner">
      <div class="acct-banner-top">
        <div class="acct-banner-user">
          <div id="accountHeroAvatar"></div>
          <div>
            <div class="acct-banner-name" id="accountHeroName">学习者</div>
            <div class="acct-banner-email" id="accountHeroEmail">未登录</div>
          </div>
        </div>
        <div class="acct-banner-badge" id="accountHeroBadge">
          <i class="fas fa-circle" style="font-size:6px;"></i>
          <span id="accountHeroStatus">未登录</span>
        </div>
      </div>
      <div class="acct-banner-hint" id="accountHeroNote">登录后可以修改昵称、头像或密码</div>
    </section>

    <!-- ── Guest Card (未登录时显示) ── -->
    <section id="accountGuestCard" class="acct-guest hidden">
      <div class="acct-guest-icon"><i class="fas fa-user-lock"></i></div>
      <h2>还没登录</h2>
      <p>登录后才能修改个人资料，去登录页完成登录或注册吧。</p>
      <div class="acct-guest-actions">
        <a href="login.html" class="acct-btn primary">去登录</a>
        <a href="index.html" class="acct-btn ghost">回首页</a>
      </div>
    </section>

    <!-- ── Logged-in Content ── -->
    <div id="accountContent" class="hidden" style="display:grid;gap:14px;">
      <!-- 个人资料 -->
      <section class="acct-section">
        <div class="acct-section-head">
          <div class="acct-section-icon orange"><i class="fas fa-user-pen"></i></div>
          <div>
            <h2>个人资料</h2>
            <p>昵称和头像会显示在首页</p>
          </div>
        </div>

        <div class="acct-field">
          <label class="acct-label" for="accountProfileName">昵称</label>
          <input id="accountProfileName" class="acct-input" type="text" maxlength="16" placeholder="例：Jason / Amy" autocomplete="nickname">
          <div class="acct-hint">首页会直接用这个名字称呼你</div>
        </div>

        <div class="acct-avatar-zone">
          <div class="acct-avatar-top">
            <div class="acct-avatar-top-text">
              <strong>头像</strong>
              <span>选一个小动物头像</span>
            </div>
            <div class="acct-avatar-chip" id="accountAvatarPreview"></div>
          </div>
          <div id="accountAvatarPicker" class="profile-avatar-grid"></div>
        </div>

        <div class="acct-actions">
          <button id="saveProfileBtn" class="acct-btn primary" type="button"><i class="fas fa-check"></i> 保存</button>
        </div>
        <div id="profileStatus" class="acct-status"></div>
      </section>

      <!-- 密码 -->
      <section class="acct-section">
        <div class="acct-section-head">
          <div class="acct-section-icon purple"><i class="fas fa-lock"></i></div>
          <div>
            <h2>修改密码</h2>
            <p>修改后立即生效，请牢记新密码</p>
          </div>
        </div>

        <div class="acct-field">
          <label class="acct-label" for="accountPasswordInput">新密码</label>
          <input id="accountPasswordInput" class="acct-input" type="password" placeholder="至少 6 位" autocomplete="new-password">
        </div>
        <div class="acct-field">
          <label class="acct-label" for="accountPasswordConfirmInput">确认密码</label>
          <input id="accountPasswordConfirmInput" class="acct-input" type="password" placeholder="再输入一次" autocomplete="new-password">
        </div>

        <div class="acct-actions">
          <button id="updatePasswordBtn" class="acct-btn secondary" type="button">更新密码</button>
        </div>
        <div id="passwordStatus" class="acct-status"></div>
      </section>

      <!-- 退出登录 -->
      <section class="acct-section">
        <div class="acct-section-head">
          <div class="acct-section-icon red"><i class="fas fa-right-from-bracket"></i></div>
          <div>
            <h2>退出登录</h2>
            <p>退出后需要重新登录才能同步数据</p>
          </div>
        </div>
        <div class="acct-actions" style="margin-top:0;">
          <button id="signOutAccountBtn" class="acct-btn danger" type="button"><i class="fas fa-right-from-bracket"></i> 退出登录</button>
          <a href="login.html" class="acct-btn ghost" style="text-decoration:none;">切换账号</a>
        </div>
        <div id="sessionStatus" class="acct-status"></div>
      </section>
    </div>

    <div class="footer-v2">小米国际部英语培训专用</div>
  </main>

    <a href="index.html" class="tab-bar-btn" data-tab="index"><i class="fas fa-home"></i><span>首页</span></a>
    <a href="learn.html" class="tab-bar-btn" data-tab="learn"><i class="fas fa-book-open"></i><span>学习</span></a>
    <a href="practice.html" class="tab-bar-btn" data-tab="practice"><i class="fas fa-gamepad"></i><span>练习</span></a>
    <a href="scenarios.html" class="tab-bar-btn" data-tab="scenarios"><i class="fas fa-map-location-dot"></i><span>场景</span></a>
    <button type="button" class="tab-bar-btn" data-tab="more" data-action="open-more-menu"><i class="fas fa-ellipsis"></i><span>更多</span></button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js?v=3.1"></script>
  <script src="js/profile-presets.js?v=3.1"></script>
  <script src="js/sync-meta.js?v=3.0"></script>
  <script src="js/storage.js?v=3.0"></script>
  <script src="js/supabase-config.js?v=3.0"></script>
  <script src="js/auth.js?v=3.0"></script>
  <script src="js/api.js?v=3.0"></script>
  <script src="js/nav-more.js?v=1.0"></script>
  <script>
    (function initAccountPage() {
      var guestCard = document.getElementById('accountGuestCard');
      var content = document.getElementById('accountContent');
      var heroAvatar = document.getElementById('accountHeroAvatar');
      var heroName = document.getElementById('accountHeroName');
      var heroEmail = document.getElementById('accountHeroEmail');
      var heroStatus = document.getElementById('accountHeroStatus');
      var heroBadge = document.getElementById('accountHeroBadge');
      var heroNote = document.getElementById('accountHeroNote');
      var profileNameInput = document.getElementById('accountProfileName');
      var avatarPreview = document.getElementById('accountAvatarPreview');
      var avatarPicker = document.getElementById('accountAvatarPicker');
      var passwordInput = document.getElementById('accountPasswordInput');
      var passwordConfirmInput = document.getElementById('accountPasswordConfirmInput');
      var profileStatus = document.getElementById('profileStatus');
      var passwordStatus = document.getElementById('passwordStatus');
      var sessionStatus = document.getElementById('sessionStatus');
      var saveProfileBtn = document.getElementById('saveProfileBtn');
      var updatePasswordBtn = document.getElementById('updatePasswordBtn');
      var signOutAccountBtn = document.getElementById('signOutAccountBtn');

      var currentState = typeof loadState === 'function' ? loadState() : null;
      var currentUser = null;
      var selectedAvatarId = currentState && currentState.profileAvatar
        ? currentState.profileAvatar
        : (window.MiProfilePresets && typeof window.MiProfilePresets.normalizePresetId === 'function'
          ? window.MiProfilePresets.normalizePresetId('')
          : '');

      function escapeHTML(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function setStatus(node, status, message) {
        if (!node) return;
        node.className = 'acct-status ' + (status || '');
        node.textContent = message || '';
      }

      function getDefaultAvatarId() {
        return window.MiProfilePresets && typeof window.MiProfilePresets.normalizePresetId === 'function'
          ? window.MiProfilePresets.normalizePresetId('')
          : selectedAvatarId;
      }

      function getUserProfile(user) {
        var metadata = user && user.user_metadata && typeof user.user_metadata === 'object' ? user.user_metadata : {};
        var localState = typeof loadState === 'function' ? loadState() : currentState;
        var name = (localState && localState.profileName)
          || (typeof metadata.display_name === 'string' ? metadata.display_name.trim() : '')
          || ((user && user.email ? user.email.split('@')[0] : '') || '学习者');
        var avatarId = (localState && localState.profileAvatar)
          || (typeof metadata.avatar_id === 'string' ? metadata.avatar_id.trim() : '')
          || getDefaultAvatarId();

        return {
          name: name,
          email: user && user.email ? user.email : '',
          avatarId: avatarId
        };
      }

      function renderAvatar(target, avatarId, label) {
        if (!target) return;
        var avatarHTML = window.MiProfilePresets && typeof window.MiProfilePresets.renderAvatar === 'function'
          ? window.MiProfilePresets.renderAvatar(avatarId, { size: 'md', label: label || '学习者' })
          : '';
        target.innerHTML = avatarHTML;
      }

      function renderAvatarChip(target, avatarId, label) {
        if (!target) return;
        var avatarHTML = window.MiProfilePresets && typeof window.MiProfilePresets.renderAvatar === 'function'
          ? window.MiProfilePresets.renderAvatar(avatarId, { size: 'sm', label: label || '学习者' })
          : '';
        target.innerHTML = avatarHTML +
          '<div>' +
            '<strong>' + escapeHTML(label || '学习者') + '</strong>' +
            '<span>' + escapeHTML(avatarId || '默认') + '</span>' +
          '</div>';
      }

      function renderAvatarPicker() {
        if (!avatarPicker || !window.MiProfilePresets || !Array.isArray(window.MiProfilePresets.list)) return;

        avatarPicker.innerHTML = window.MiProfilePresets.list.map(function mapPreset(preset) {
          var selectedClass = preset.id === selectedAvatarId ? ' is-selected' : '';
          var avatarHTML = window.MiProfilePresets.renderAvatar(preset.id, { size: 'md', label: preset.name });
          return '' +
            '<button class="profile-avatar-option' + selectedClass + '" type="button" data-avatar-id="' + preset.id + '" aria-pressed="' + (preset.id === selectedAvatarId ? 'true' : 'false') + '">' +
              avatarHTML +
              '<span class="profile-avatar-name">' + escapeHTML(preset.name) + '</span>' +
            '</button>';
        }).join('');
      }

      function renderProfilePreview(name) {
        renderAvatarChip(avatarPreview, selectedAvatarId, name);
      }

      function applyLoggedOutState() {
        guestCard.classList.remove('hidden');
        content.classList.add('hidden');
        heroStatus.textContent = '未登录';
        heroBadge.style.background = 'rgba(255,255,255,0.15)';
        heroNote.textContent = '登录后可以修改昵称、头像或密码';
        heroName.textContent = '学习者';
        heroEmail.textContent = '未登录';
        renderAvatar(heroAvatar, getDefaultAvatarId(), '学习者');
      }

      function applyLoggedInState(user) {
        currentUser = user;
        currentState = typeof loadState === 'function' ? loadState() : currentState;
        var profile = getUserProfile(user);

        guestCard.classList.add('hidden');
        content.classList.remove('hidden');
        content.style.display = 'grid';
        selectedAvatarId = profile.avatarId;
        profileNameInput.value = profile.name;
        heroName.textContent = profile.name;
        heroEmail.textContent = profile.email || '-';
        heroStatus.textContent = '已登录';
        heroBadge.style.background = 'rgba(255,255,255,0.22)';
        heroNote.textContent = '修改后会立即同步到首页';
        renderAvatar(heroAvatar, profile.avatarId, profile.name);
        renderProfilePreview(profile.name);
        renderAvatarPicker();
      }

      function updateProfileStateAndSync(name, avatarId) {
        if (typeof updateProfileState !== 'function' || typeof loadState !== 'function' || typeof saveState !== 'function') {
          return;
        }

        var nextState = updateProfileState(loadState(), {
          profileName: name,
          profileAvatar: avatarId
        }, {
          updatedAt: new Date().toISOString()
        });

        saveState(nextState, { reason: 'account_profile_update' });
        currentState = nextState;
      }

      async function refreshAccountState() {
        var setup = MiAuth.ensureClient();
        if (!setup.ok) {
          applyLoggedOutState();
          setStatus(sessionStatus, 'error', '服务暂时不可用，请稍后再试');
          return;
        }

        try {
          var sessionResult = await MiAuth.getSession();
          if (sessionResult && sessionResult.ok && sessionResult.session && sessionResult.session.user) {
            applyLoggedInState(sessionResult.session.user);
            return;
          }
        } catch (_) {}

        applyLoggedOutState();
      }

      avatarPicker.addEventListener('click', function onPickAvatar(event) {
        var button = event.target.closest('[data-avatar-id]');
        if (!button) return;
        selectedAvatarId = button.getAttribute('data-avatar-id') || selectedAvatarId;
        renderAvatarPicker();
        renderProfilePreview((profileNameInput.value || '').trim() || (currentUser && currentUser.email ? currentUser.email.split('@')[0] : '学习者'));
      });

      profileNameInput.addEventListener('input', function onNameInput() {
        renderProfilePreview((profileNameInput.value || '').trim() || (currentUser && currentUser.email ? currentUser.email.split('@')[0] : '学习者'));
      });

      saveProfileBtn.addEventListener('click', async function onSaveProfile() {
        if (!currentUser) {
          setStatus(profileStatus, 'error', '请先登录');
          return;
        }

        var nextName = (profileNameInput.value || '').trim();
        if (!nextName) {
          setStatus(profileStatus, 'error', '昵称不能为空');
          return;
        }

        setStatus(profileStatus, '', '保存中...');
        updateProfileStateAndSync(nextName, selectedAvatarId);

        var metadataResult = await MiAuth.updateProfileMetadata({
          profileName: nextName,
          profileAvatar: selectedAvatarId
        });

        if (!metadataResult.ok) {
          setStatus(profileStatus, 'error', '本地已保存，云端同步失败：' + metadataResult.error);
          await refreshAccountState();
          return;
        }

        if (window.MiApi && typeof window.MiApi.syncLocalStateToCloud === 'function') {
          try {
            await window.MiApi.syncLocalStateToCloud(loadState(), { reason: 'account_profile_update' });
          } catch (_) {}
        }

        setStatus(profileStatus, 'success', '已保存');
        await refreshAccountState();
      });

      updatePasswordBtn.addEventListener('click', async function onUpdatePassword() {
        if (!currentUser) {
          setStatus(passwordStatus, 'error', '请先登录');
          return;
        }

        var nextPassword = passwordInput.value || '';
        var confirmPassword = passwordConfirmInput.value || '';
        if (!nextPassword || nextPassword.length < 6) {
          setStatus(passwordStatus, 'error', '密码至少 6 位');
          return;
        }
        if (nextPassword !== confirmPassword) {
          setStatus(passwordStatus, 'error', '两次输入不一致');
          return;
        }

        if (!confirm('确定要修改密码吗？修改后立即生效，请牢记新密码。')) {
          return;
        }

        setStatus(passwordStatus, '', '更新中...');
        var result = await MiAuth.updatePassword(nextPassword);
        if (!result.ok) {
          setStatus(passwordStatus, 'error', '失败：' + result.error);
          return;
        }

        passwordInput.value = '';
        passwordConfirmInput.value = '';
        setStatus(passwordStatus, 'success', '密码已更新');
      });

      signOutAccountBtn.addEventListener('click', async function onSignOut() {
        setStatus(sessionStatus, '', '退出中...');
        var result = await MiAuth.signOut();
        if (!result.ok) {
          setStatus(sessionStatus, 'error', '退出失败：' + result.error);
          return;
        }

        currentUser = null;
        applyLoggedOutState();
        setStatus(sessionStatus, 'success', '已退出');
      });

      window.addEventListener('mi-auth-changed', function onAuthChanged(event) {
        refreshAccountState();

        // Handle password recovery flow from reset email
        if (event && event.detail && event.detail.event === 'PASSWORD_RECOVERY') {
          passwordInput.focus();
          setStatus(passwordStatus, '', '请在下方设置新密码');
          // Scroll to password section
          var pwSection = passwordInput.closest('.acct-section');
          if (pwSection) pwSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      });

      refreshAccountState();
    })();
  </script>
</body>
</html>
