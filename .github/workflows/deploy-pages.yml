name: Deploy Mi English to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp learn.html _site/
          cp practice.html _site/
          cp browse.html _site/
          cp progress.html _site/
          cp scenarios.html _site/
          cp roots.html _site/
          cp release.json _site/
          cp .nojekyll _site/
          cp -R css _site/
          cp -R js _site/
          cp -R assets _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
